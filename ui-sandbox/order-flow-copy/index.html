<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AiDaCamp Order Flow Sandbox</title>
  <meta name="robots" content="noindex,nofollow">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="of-page">
    <header class="of-header">
      <div>
        <p class="of-kicker">Sandbox / Изолированная копия flow</p>
        <h1>Отдельный флоу выбора смены и бронирования</h1>
      </div>
      <div class="of-actions">
        <button id="ofEntryCta" class="of-btn of-btn--primary" type="button">Выбрать смену и цену</button>
        <button id="ofResetState" class="of-btn of-btn--ghost" type="button">Сбросить sandbox state</button>
      </div>
    </header>

    <section class="of-layout">
      <section class="of-column of-column--main">
        <article class="of-card">
          <div class="of-card__head">
            <h2>Смены</h2>
            <button id="ofToggleShifts" class="of-link" type="button" hidden>Показать другие смены</button>
          </div>
          <div id="ofShiftList" class="of-shift-list"></div>
        </article>

        <article id="ofShiftCard" class="of-card" hidden></article>

        <article id="ofBookingBlock" class="of-card" hidden></article>

        <article id="ofSuccessBlock" class="of-card" hidden></article>
      </section>

      <aside class="of-column of-column--side">
        <article class="of-card">
          <h2>Hero Left</h2>
          <div id="ofHeroLeft" class="of-hero-slot">Смена не выбрана</div>
        </article>

        <article class="of-card">
          <h2>Hero Right</h2>
          <div id="ofHeroRight" class="of-hero-slot">Финальный оффер отсутствует</div>
        </article>

        <article class="of-card">
          <div class="of-card__head">
            <h2>Event log (Telegram payload preview)</h2>
            <button id="ofClearEvents" class="of-link" type="button">Очистить</button>
          </div>
          <pre id="ofEvents" class="of-events"></pre>
        </article>
      </aside>
    </section>
  </main>

  <div id="ofModalRoot" class="of-modal-root" hidden></div>
  <div id="ofToast" class="of-toast" hidden></div>

  <script src="./app.js"></script>
</body>
</html>
