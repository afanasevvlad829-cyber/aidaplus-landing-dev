<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AidaCamp Next Architecture</title>
  <meta name="description" content="Параллельная модульная архитектура с single-file сборкой.">
  <style>
/* file: styles/tokens.css */
:root {
  --ac-bg: #f6f7fb;
  --ac-surface: #ffffff;
  --ac-text: #111827;
  --ac-muted: #6b7280;
  --ac-primary: #ff7700;
  --ac-primary-strong: #e36400;
  --ac-border: #e5e7eb;
  --ac-shadow: 0 20px 45px rgba(15, 23, 42, 0.1);
  --ac-radius: 18px;
}


/* file: styles/base.css */
*,
*::before,
*::after {
  box-sizing: border-box;
}

html,
body {
  margin: 0;
  padding: 0;
}

body {
  font-family: "Comfortaa", system-ui, sans-serif;
  background: radial-gradient(circle at 20% 10%, #fff3e8 0%, var(--ac-bg) 42%, #eef1fa 100%);
  color: var(--ac-text);
  min-height: 100vh;
}

.ac-next-wrap {
  max-width: 1100px;
  margin: 0 auto;
  padding: 28px 16px 36px;
}

.ac-next-title {
  font-size: clamp(24px, 4vw, 40px);
  margin: 0 0 8px;
}

.ac-next-sub {
  margin: 0 0 20px;
  color: var(--ac-muted);
  line-height: 1.5;
}

.ac-next-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 14px;
}

.ac-next-card {
  background: var(--ac-surface);
  border: 1px solid var(--ac-border);
  border-radius: var(--ac-radius);
  box-shadow: var(--ac-shadow);
  padding: 16px;
}

.ac-next-card__title {
  margin: 0 0 10px;
  font-size: 16px;
}

.ac-next-kv {
  margin: 0;
  display: grid;
  gap: 8px;
}

.ac-next-kv dt {
  color: var(--ac-muted);
  font-size: 12px;
}

.ac-next-kv dd {
  margin: 2px 0 0;
  font-size: 13px;
}

.ac-next-actions {
  margin-top: 18px;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.ac-next-btn {
  border: none;
  border-radius: 12px;
  cursor: pointer;
  font: inherit;
  padding: 10px 14px;
  background: var(--ac-primary);
  color: #fff;
  font-weight: 700;
}

.ac-next-btn:hover {
  background: var(--ac-primary-strong);
}

.ac-next-log {
  margin-top: 16px;
  padding: 12px;
  border-radius: 12px;
  background: #0f172a;
  color: #e2e8f0;
  font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  font-size: 12px;
  line-height: 1.45;
  max-height: 220px;
  overflow: auto;
}

@media (max-width: 900px) {
  .ac-next-grid {
    grid-template-columns: 1fr;
  }
}

  </style>
</head>
<body>
  <div id="ac-next-root"></div>
  <script>
/* file: core/namespace.js */
(function (global) {
  if (global.ACNext) return;

  global.ACNext = {
    core: {},
    features: {},
    ui: {},
    utils: {}
  };
})(window);


/* file: core/events.js */
(function (global) {
  var ACNext = global.ACNext;

  function createEvents() {
    var listeners = {};

    function on(eventName, handler) {
      if (!listeners[eventName]) listeners[eventName] = [];
      listeners[eventName].push(handler);
      return function off() {
        listeners[eventName] = (listeners[eventName] || []).filter(function (h) { return h !== handler; });
      };
    }

    function emit(eventName, payload) {
      (listeners[eventName] || []).forEach(function (handler) {
        try { handler(payload); } catch (err) { console.error("[ACNext events]", err); }
      });
    }

    return { on: on, emit: emit };
  }

  ACNext.core.createEvents = createEvents;
})(window);


/* file: core/store.js */
(function (global) {
  var ACNext = global.ACNext;

  function clone(obj) {
    return JSON.parse(JSON.stringify(obj));
  }

  function createStore(initialState) {
    var state = clone(initialState || {});
    var subscribers = [];

    function getState() {
      return clone(state);
    }

    function subscribe(handler) {
      subscribers.push(handler);
      return function unsubscribe() {
        subscribers = subscribers.filter(function (h) { return h !== handler; });
      };
    }

    function patch(partial, reason) {
      state = Object.assign({}, state, partial || {});
      subscribers.forEach(function (handler) {
        try { handler(getState(), reason || "patch"); } catch (err) { console.error("[ACNext store]", err); }
      });
    }

    return {
      getState: getState,
      subscribe: subscribe,
      patch: patch
    };
  }

  ACNext.core.createStore = createStore;
})(window);


/* file: core/effects.js */
(function (global) {
  var ACNext = global.ACNext;

  function createEffects() {
    var intervals = {};
    var timeouts = {};

    function setNamedInterval(name, cb, delay) {
      if (intervals[name]) clearInterval(intervals[name]);
      intervals[name] = setInterval(cb, delay);
      return intervals[name];
    }

    function setNamedTimeout(name, cb, delay) {
      if (timeouts[name]) clearTimeout(timeouts[name]);
      timeouts[name] = setTimeout(cb, delay);
      return timeouts[name];
    }

    function clearAll() {
      Object.keys(intervals).forEach(function (name) { clearInterval(intervals[name]); });
      Object.keys(timeouts).forEach(function (name) { clearTimeout(timeouts[name]); });
      intervals = {};
      timeouts = {};
    }

    return {
      setNamedInterval: setNamedInterval,
      setNamedTimeout: setNamedTimeout,
      clearAll: clearAll
    };
  }

  ACNext.core.createEffects = createEffects;
})(window);


/* file: features/shifts/index.js */
(function (global) {
  var ACNext = global.ACNext;

  function initShifts(ctx) {
    var mockShifts = [
      { id: "jun-hit", name: "Июнь HIT", price: 75900, seats: 42 },
      { id: "jul-ai", name: "Июль AI", price: 79900, seats: 61 },
      { id: "aug-pro", name: "Август PRO", price: 82900, seats: 73 }
    ];

    ctx.store.patch({ shifts: mockShifts }, "shifts:init");
    ctx.log("shifts:init -> " + mockShifts.length + " смен");
  }

  ACNext.features.initShifts = initShifts;
})(window);


/* file: features/media/index.js */
(function (global) {
  var ACNext = global.ACNext;

  function initMedia(ctx) {
    var mediaState = {
      photosCount: 24,
      videosCount: 8,
      categories: ["all", "food", "pool", "ai"]
    };

    ctx.store.patch({ media: mediaState }, "media:init");
    ctx.log("media:init -> photos=" + mediaState.photosCount + ", videos=" + mediaState.videosCount);
  }

  ACNext.features.initMedia = initMedia;
})(window);


/* file: features/booking/index.js */
(function (global) {
  var ACNext = global.ACNext;

  function initBooking(ctx) {
    var booking = {
      selectedShiftId: null,
      promoLocked: false,
      funnelStep: 1
    };
    ctx.store.patch({ booking: booking }, "booking:init");
    ctx.log("booking:init -> step=" + booking.funnelStep);
  }

  ACNext.features.initBooking = initBooking;
})(window);


/* file: ui/app-shell.js */
(function (global) {
  var ACNext = global.ACNext;

  function fmtRub(v) {
    return new Intl.NumberFormat("ru-RU").format(v || 0) + " ₽";
  }

  function render(root, state, logs, onRebuild) {
    var shifts = state.shifts || [];
    var media = state.media || { photosCount: 0, videosCount: 0, categories: [] };
    var booking = state.booking || {};
    var minPrice = shifts.length ? Math.min.apply(null, shifts.map(function (s) { return s.price; })) : 0;

    root.innerHTML =
      '<div class="ac-next-wrap">' +
      '  <h1 class="ac-next-title">Architecture Next</h1>' +
      '  <p class="ac-next-sub">Модульная разработка в отдельной папке, финальная поставка в один HTML-файл.</p>' +
      '  <div class="ac-next-grid">' +
      '    <article class="ac-next-card">' +
      '      <h2 class="ac-next-card__title">Shifts</h2>' +
      '      <dl class="ac-next-kv">' +
      '        <div><dt>Количество смен</dt><dd>' + shifts.length + "</dd></div>" +
      '        <div><dt>Минимальная цена</dt><dd>' + fmtRub(minPrice) + "</dd></div>" +
      "      </dl>" +
      "    </article>" +
      '    <article class="ac-next-card">' +
      '      <h2 class="ac-next-card__title">Media</h2>' +
      '      <dl class="ac-next-kv">' +
      '        <div><dt>Фото</dt><dd>' + media.photosCount + "</dd></div>" +
      '        <div><dt>Видео</dt><dd>' + media.videosCount + "</dd></div>" +
      '        <div><dt>Категории</dt><dd>' + (media.categories || []).join(", ") + "</dd></div>" +
      "      </dl>" +
      "    </article>" +
      '    <article class="ac-next-card">' +
      '      <h2 class="ac-next-card__title">Booking</h2>' +
      '      <dl class="ac-next-kv">' +
      '        <div><dt>Текущий шаг</dt><dd>' + (booking.funnelStep || 1) + "</dd></div>" +
      '        <div><dt>Выбранная смена</dt><dd>' + (booking.selectedShiftId || "не выбрана") + "</dd></div>" +
      '        <div><dt>Цена зафиксирована</dt><dd>' + (booking.promoLocked ? "да" : "нет") + "</dd></div>" +
      "      </dl>" +
      "    </article>" +
      "  </div>" +
      '  <div class="ac-next-actions">' +
      '    <button class="ac-next-btn" id="ac-next-rebuild" type="button">Перерисовать shell</button>' +
      "  </div>" +
      '  <pre class="ac-next-log" id="ac-next-log"></pre>' +
      "</div>";

    var logEl = root.querySelector("#ac-next-log");
    if (logEl) logEl.textContent = logs.join("\n");

    var rebuildBtn = root.querySelector("#ac-next-rebuild");
    if (rebuildBtn) {
      rebuildBtn.addEventListener("click", function () {
        onRebuild();
      });
    }
  }

  ACNext.ui.renderAppShell = render;
})(window);


/* file: core/bootstrap.js */
(function (global) {
  var ACNext = global.ACNext;

  function bootstrap() {
    var events = ACNext.core.createEvents();
    var effects = ACNext.core.createEffects();
    var store = ACNext.core.createStore({
      shifts: [],
      media: null,
      booking: null
    });

    var logs = [];
    function log(msg) {
      logs.push(new Date().toISOString() + " " + msg);
      if (logs.length > 80) logs.shift();
    }

    var root = document.getElementById("ac-next-root");
    if (!root) return;

    function render(reason) {
      ACNext.ui.renderAppShell(root, store.getState(), logs, function () {
        log("ui:manual-rebuild");
        render("manual-rebuild");
      });
      if (reason) log("ui:render -> " + reason);
    }

    store.subscribe(function (_state, reason) {
      render(reason || "state");
    });

    var ctx = {
      events: events,
      effects: effects,
      store: store,
      log: log
    };

    ACNext.features.initShifts(ctx);
    ACNext.features.initMedia(ctx);
    ACNext.features.initBooking(ctx);

    effects.setNamedInterval("heartbeat", function () {
      log("heartbeat");
      render("heartbeat");
    }, 12000);

    render("bootstrap");
  }

  ACNext.core.bootstrap = bootstrap;
})(window);


/* file: main.js */
(function (global) {
  function run() {
    if (!global.ACNext || !global.ACNext.core || typeof global.ACNext.core.bootstrap !== "function") {
      console.error("[ACNext] bootstrap is not available");
      return;
    }
    global.ACNext.core.bootstrap();
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", run);
  } else {
    run();
  }
})(window);

  </script>
</body>
</html>
