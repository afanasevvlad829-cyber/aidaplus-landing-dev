<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AidaCamp — IT-лагерь в Подмосковье</title>
  <meta name="description" content="AidaCamp — IT-лагерь для детей 7–14 лет: AI-проекты, бассейн, спорт, внутренняя экономика и бронирование смен.">

  <!-- Inlined critical styles (excerpt from original head) -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;600;700&display=swap');

    .t-header,#t-header,.t-footer,#t-footer,
    [data-record-type="header"],[data-record-type="footer"]{
      display:none!important;height:0!important;overflow:hidden!important;
    }
    .t-section__container,.t396__artboard,.t396{
      max-width:100%!important;width:100%!important;padding:0!important;
    }
    *,*::before,*::after{box-sizing:border-box;}

    .ac-wrap{
      width:100%;min-height:100vh;background:#f0f0f5;
      display:flex;align-items:center;justify-content:center;
      padding:40px;font-family:"Comfortaa",system-ui,sans-serif;
    }
    .ac-grid{
      width:100%;max-width:1280px;
      display:grid;grid-template-columns:1fr 1fr;
      gap:28px;align-items:stretch;
    }
    @media(max-width:960px){
      .ac-grid{grid-template-columns:1fr;}
      .ac-wrap{padding:24px 16px;min-height:auto;}
    }
  </style>
</head>
