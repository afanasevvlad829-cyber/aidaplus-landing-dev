<!-- Модальное окно фиксации цены -->
<div class="ac-fix-backdrop" id="acFixBackdrop">
  <div class="ac-fix-modal">
    <button class="ac-fix-modal__close" id="acFixClose">✕</button>
    <div class="ac-fix-modal__top">
      <div class="ac-fix-modal__emoji">🔒</div>
      <div class="ac-fix-modal__title">Подробнее о смене</div>
      <div class="ac-fix-modal__code" id="acFixCode"></div>
      <div class="ac-fix-modal__price" id="acFixPrice"></div>
      <div class="ac-fix-modal__shift" id="acFixShift"></div>
      <div class="ac-fix-modal__sub">Введите номер телефона — цена будет зафиксирована для вас на 72 часа</div>
    </div>
    <div class="ac-fix-modal__body">
      <div id="acFixForm">
        <input class="ac-fix-modal__input" id="acFixPhone" autocomplete="tel" type="tel" placeholder="+7 (___) ___-__-__">
        <div class="ac-fix-modal__hint">Мы не передаём номер третьим лицам</div>
        <button class="ac-fix-modal__btn" id="acFixSubmit">🔒 Зафиксировать мою цену</button>
        <button class="ac-fix-modal__btn ac-fix-modal__btn--ghost" id="acFixLater">Позже</button>
      </div>
      <div class="ac-fix-modal__success" id="acFixSuccess">
        <div class="ac-fix-modal__success-icon">✅</div>
        <div class="ac-fix-modal__success-title">Цена зафиксирована!</div>
        <div class="ac-fix-modal__success-text" id="acFixSuccessText"></div>
        <div class="ac-fix-modal__success-timer" id="acFixModalTimer"></div>
        <button class="ac-fix-modal__btn" id="acFixGoBook">Перейти к бронированию →</button>
        <button class="ac-fix-modal__btn ac-fix-modal__btn--secondary" id="acFixClose2">Закрыть</button>
        <div class="ac-share" id="acShare">
          <div class="ac-share__title">Поделитесь с друзьями 🙌</div>
          <div class="ac-share__sub">Расскажите — вдруг их дети тоже хотят в лагерь</div>
          <div class="ac-share__btns">
            <button class="ac-share__btn ac-share__btn--vk" id="acShareVk">ВКонтакте</button>
            <button class="ac-share__btn ac-share__btn--tg" id="acShareTg">Telegram</button>
            <button class="ac-share__btn ac-share__btn--wa" id="acShareWa">WhatsApp</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Нижняя плашка-баннер -->
<div class="ac-bar" id="acBar">
  <div style="flex:1;min-width:0;">
    <div class="ac-bar__text" id="acBarText"></div>
    <div class="ac-bar__timer" id="acBarTimer"></div>
  </div>
  <div class="ac-bar__btns">
    <button class="ac-bar__btn ac-bar__btn--primary" id="acBarAction"></button>
    <button class="ac-bar__btn ac-bar__btn--secondary" id="acBarClose">✕</button>
  </div>
</div>
