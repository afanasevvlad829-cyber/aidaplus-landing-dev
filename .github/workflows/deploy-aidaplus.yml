name: Deploy AidaPlus Dev

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy on server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AIDAPLUS_HOST }}
          username: ${{ secrets.AIDAPLUS_USER }}
          key: ${{ secrets.AIDAPLUS_SSH_KEY }}
          script: |
            cd /var/www/aidaplus-dev
            git pull origin main
            chmod +x deploy.sh
            ./deploy.sh
