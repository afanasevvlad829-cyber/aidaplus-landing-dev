<!-- Возрастной селектор живёт внутри интерактивной карточки (leвая часть hero) -->
<!-- Маркап динамически заполняется в элемент с id="acCardContent" через JavaScript. -->
<!-- Этот файл выделен как частичный шаблон для возраста/слайдера без изменения логики. -->
<div class="ac-age" data-partial="age-selector">
  <div class="ac-age__label">Возраст ребёнка</div>
  <div class="ac-age__hint">Передвиньте ползунок, чтобы подобрать программу</div>
  <input type="range" min="7" max="14" step="1" value="7" aria-label="Возраст ребёнка">
  <div class="ac-age__marks">
    <span>7</span>
    <span>8</span>
    <span>9</span>
    <span>10</span>
    <span>11</span>
    <span>12</span>
    <span>13</span>
    <span>14</span>
  </div>
</div>
