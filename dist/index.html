<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" href="/assets/aida-logo-small.png">

<!-- AC_BUILD_STYLE_START -->
<style id="ac-build-main-css">
@import url("./base/tokens.css");
@import url("./dev/audit.css");

* {
  box-sizing: border-box;
}

html,
body {
  margin: 0;
  padding: 0;
  max-width: 100%;
  overflow-x: hidden;
}

body {
  background: var(--ac-bg);
  color: var(--ac-text);
  font-family: "Comfortaa", system-ui, -apple-system, sans-serif;
  font-size: var(--font-size-base);
}

.ac-container {
  width: min(var(--container-max), calc(100% - (var(--container-padding-desktop) * 2)));
  margin: 0 auto;
}

.ac-icon {
  width: var(--icon-lg);
  height: var(--icon-lg);
  display: inline-block;
}

.ac-icon--sm {
  width: var(--icon-sm);
  height: var(--icon-sm);
}

.ac-tech-badge {
  position: fixed;
  top: var(--space-sm);
  right: var(--space-lg);
  z-index: 70;
  border-radius: var(--radius-sm);
  padding: var(--space-xs) var(--space-sm) var(--space-xs) var(--space-lg);
  font-size: var(--font-size-body-sm);
  font-weight: 700;
  color: #eff3ff;
  background: #3c455a;
  box-shadow: var(--ac-shadow-badge);
  display: inline-flex;
  align-items: center;
  gap: var(--space-sm);
}

.ac-tech-badge__text {
  white-space: nowrap;
}

.ac-tech-badge__close {
  width: 22px;
  height: 22px;
  border: 0;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.16);
  color: #fff;
  display: grid;
  place-items: center;
  cursor: pointer;
  padding: 0;
}

.ac-tech-badge__close:hover {
  background: rgba(255, 255, 255, 0.28);
}

.ac-mode-toggle {
  position: relative;
  z-index: 1;
  border: var(--border-1) solid var(--ac-border);
  background: #fff;
  border-radius: var(--radius-sm);
  width: var(--toggle-width);
  height: var(--toggle-height);
  padding: 0 var(--toggle-padding-x);
  display: inline-flex;
  align-items: center;
  gap: var(--space-sm);
  cursor: grab;
  font: inherit;
  color: #6d7790;
  transition:
    transform var(--motion-duration-fast) var(--motion-ease),
    box-shadow var(--motion-duration-fast) var(--motion-ease),
    border-color var(--motion-duration-fast) var(--motion-ease),
    color var(--motion-duration-fast) var(--motion-ease),
    background-color var(--motion-duration-fast) var(--motion-ease);
}

.ac-mode-toggle__label {
  font-size: var(--font-size-chip);
  font-weight: 700;
  line-height: var(--line-height-chip);
}

.ac-mode-toggle__track {
  width: var(--toggle-track-width);
  height: var(--toggle-track-height);
  border-radius: var(--radius-pill);
  border: 0;
  box-shadow: inset 0 0 0 var(--border-1) rgba(148, 163, 184, 0.15);
  background: #d9e0ea;
  position: relative;
  padding: var(--toggle-track-pad-y) var(--toggle-track-pad-x);
  transition:
    background-color var(--motion-duration-fast) var(--motion-ease),
    box-shadow var(--motion-duration-fast) var(--motion-ease);
}

.ac-mode-toggle__thumb {
  width: var(--toggle-thumb-size);
  height: var(--toggle-thumb-size);
  border-radius: 50%;
  background: #fff;
  box-shadow: var(--ac-shadow-toggle-thumb);
  position: absolute;
  top: var(--toggle-thumb-inset);
  left: var(--toggle-thumb-inset);
  transition:
    transform var(--motion-duration-fast) var(--motion-ease),
    box-shadow var(--motion-duration-fast) var(--motion-ease);
}

body[data-mode="full"] .ac-mode-toggle {
  color: #2a3248;
}

body[data-mode="full"] .ac-mode-toggle__track {
  background: linear-gradient(120deg, var(--ac-accent), var(--ac-accent-strong));
  border-color: transparent;
}

body[data-mode="full"] .ac-mode-toggle__thumb {
  transform: translateX(var(--toggle-thumb-shift));
}

.ac-header {
  display: none;
}

.ac-header__inner {
  min-height: var(--topnav-height);
  display: flex;
  align-items: center;
}

.ac-brand {
  text-decoration: none;
  color: inherit;
  display: inline-flex;
  gap: var(--space-md);
  align-items: center;
  opacity: 0.92;
}

.ac-brand__logo {
  border-radius: var(--space-md);
  border: var(--border-1) solid var(--ac-border);
}

.ac-brand__text {
  display: grid;
  gap: var(--space-xs);
}

.ac-brand__text strong {
  font-size: var(--font-size-brand);
}

.ac-brand__text small {
  color: var(--ac-sub);
  font-size: var(--font-size-meta);
}

.ac-top-nav {
  margin-top: 0;
  padding-bottom: var(--space-2);
  display: flex;
  align-items: center;
  gap: var(--space-sm);
  flex-wrap: nowrap;
  overflow-x: hidden;
  overflow-y: hidden;
  height: var(--topnav-height);
  scrollbar-width: none;
  -ms-overflow-style: none;
}

.ac-top-nav::-webkit-scrollbar {
  display: none;
}

.ac-top-nav {
  display: flex;
}

.ac-top-nav .ac-container {
  padding-right: var(--topnav-right-safe);
  display: flex;
  align-items: center;
  height: 100%;
  min-width: 0;
}

.ac-menu {
  display: flex;
  align-items: center;
  gap: var(--space-sm);
  flex-wrap: nowrap;
}

.ac-menu-shell {
  width: 100%;
  max-width: 100%;
  display: flex;
  align-items: center;
  min-width: 0;
}

.ac-menu--compact {
  gap: var(--space-xs);
  margin: var(--space-14) 0 var(--space-sm);
  width: 100%;
  max-width: 100%;
  min-width: 0;
  overflow-x: auto;
  overflow-y: hidden;
  scrollbar-width: none;
  -ms-overflow-style: none;
}

.ac-menu--compact::-webkit-scrollbar {
  display: none;
}

.ac-menu-item--compact {
  width: auto;
  height: var(--chip-height-compact);
  padding: var(--space-7) var(--space-10);
  border-radius: var(--radius-pill);
  border: var(--border-1) solid var(--ac-border);
  background: #fff;
  display: grid;
  place-items: center;
  text-decoration: none;
  box-shadow: none;
}

.ac-menu-item--compact.is-active {
  background: linear-gradient(120deg, var(--ac-accent), var(--ac-accent-strong));
  border-color: transparent;
}

.ac-menu-item--compact.is-active img {
  filter: brightness(0) invert(1);
}

.ac-menu--full {
  gap: var(--space-sm);
  padding: 0;
  margin: var(--space-14) 0 var(--space-md);
  flex-wrap: nowrap;
  min-width: 0;
  max-width: 100%;
  height: auto;
  overflow-x: auto;
  overflow-y: hidden;
  scrollbar-width: none;
  -ms-overflow-style: none;
}

.ac-menu--full::-webkit-scrollbar {
  display: none;
}

.ac-menu--compact .ac-mode-toggle,
.ac-menu--full .ac-mode-toggle {
  margin-left: auto;
  flex: 0 0 auto;
}

.ac-chip,
.ac-menu-item--full {
  display: inline-flex;
  align-items: center;
  gap: var(--space-xs);
  text-decoration: none;
  border: var(--border-1) solid var(--ac-border);
  border-radius: var(--radius-sm);
  background: #fff;
  color: var(--ac-chip-text);
  padding: 0 var(--chip-padding-x);
  font-size: var(--font-size-chip);
  font-weight: 700;
  height: var(--chip-height);
  min-height: var(--chip-height);
  white-space: nowrap;
  flex-shrink: 0;
}

.ac-menu-item--full .ac-icon--sm {
  width: var(--icon-md);
  height: var(--icon-md);
}

/* Unified micro-interactions for interactive controls */
:where(
  .ac-menu-item--compact,
  .ac-menu-item--full,
  .ac-primary-btn,
  .ac-round-btn,
  .ac-hero-pill,
  .ac-direction-btn,
  .ac-shift-toggle,
  .ac-btn-soft,
  .ac-overlay-close,
  .ac-shift-item,
  .ac-social
) {
  transition:
    transform var(--motion-duration-fast) var(--motion-ease),
    box-shadow var(--motion-duration-fast) var(--motion-ease),
    background-color var(--motion-duration-fast) var(--motion-ease),
    border-color var(--motion-duration-fast) var(--motion-ease),
    color var(--motion-duration-fast) var(--motion-ease),
    filter var(--motion-duration-fast) var(--motion-ease),
    opacity var(--motion-duration-fast) var(--motion-ease);
}

/* Cards: hover polish without layout shifts */
:where(.ac-card, .ac-video-card, .ac-hero-left, .ac-hero-right) {
  transition:
    transform var(--motion-duration-fast) var(--motion-ease),
    box-shadow var(--motion-duration-fast) var(--motion-ease);
}

.ac-menu-item--full.is-active {
  color: #ef8300;
  border-color: var(--ac-border);
  box-shadow: none;
}

:where(.ac-menu-item--compact, .ac-menu-item--full):hover {
  transform: translateY(-1px) scale(1.02);
  box-shadow: var(--ac-shadow-chip-hover);
}

.ac-menu-item--full:hover {
  background: var(--ac-chip-hover-bg);
}

.ac-menu-item--full.is-active {
  border-color: var(--ac-border);
  background: #fff;
}

.ac-main {
  padding-bottom: var(--space-2xl);
  min-width: 0;
}

.ac-hero {
  padding-top: 0;
  min-width: 0;
}

.ac-hero__grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--space-2xl);
  align-items: stretch;
  min-width: 0;
}

.ac-hero-left,
.ac-hero-right {
  border-radius: var(--radius-xl);
  border: var(--border-1) solid #e0e5f0;
  background: var(--ac-panel);
  box-shadow: var(--ac-shadow-hero);
}

.ac-hero-left,
.ac-hero-right,
.ac-card--hero {
  height: 100%;
  min-width: 0;
}

.ac-hero-left {
  padding: 0;
  border: 0;
  background: transparent;
  box-shadow: none;
}

.ac-compact-nav {
  display: none;
  max-width: 100%;
  overflow: hidden;
}

.ac-card {
  background: #fff;
  border: var(--border-1) solid #dde2ee;
  border-radius: var(--space-22);
  padding: var(--space-22);
  box-shadow: var(--ac-shadow-card);
}

:where(.ac-card, .ac-video-card, .ac-hero-left, .ac-hero-right):hover {
  transform: translateY(-1px);
  box-shadow: var(--ac-shadow-card-hover);
}

.ac-card--hero {
  background: #f4f6fc;
  border-radius: var(--radius-lg);
  padding: var(--space-3xl);
  display: flex;
  flex-direction: column;
}

.ac-hero-title {
  margin: var(--space-10) 0 var(--space-md);
  font-size: var(--font-size-25-94);
  line-height: var(--line-height-32-425);
  overflow-wrap: anywhere;
}

.ac-hero-subtitle {
  margin: 0 0 var(--space-6);
  color: var(--ac-sub);
  font-size: var(--font-size-12-97);
  line-height: var(--line-height-20-752);
  overflow-wrap: anywhere;
}

.ac-progress {
  margin: 0 0 var(--space-lg);
  color: #ef8300;
  font-size: var(--font-size-lg);
  font-weight: 700;
}

.ac-hero-benefits {
  list-style: none;
  margin: 0;
  padding: 0;
  display: grid;
  gap: var(--space-md);
}

.ac-hero-benefits-row {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: var(--space-md);
  align-items: center;
}

.ac-hero-motto {
  display: grid;
  justify-items: center;
  gap: var(--space-xs);
  width: 110px;
  flex: 0 0 110px;
}

.ac-hero-motto__logo {
  width: 74px;
  height: 74px;
  border-radius: 50%;
  border: var(--border-1) solid var(--ac-border);
  background: #fff;
  object-fit: contain;
  padding: var(--space-2xs);
}

.ac-hero-motto__text {
  color: #ef8300;
  font-size: var(--font-size-13);
  line-height: 1.25;
  text-align: center;
}

.ac-hero-benefits li {
  display: flex;
  align-items: center;
  gap: var(--space-md);
  color: #2f3a56;
  font-size: var(--font-size-h3);
  min-width: 0;
}

.ac-benefit-icon {
  width: var(--size-control);
  height: var(--size-control);
  border-radius: var(--space-sm);
  border: var(--border-1) solid #e7dccb;
  background: #fffaf1;
  display: grid;
  place-items: center;
}

.ac-age-block {
  margin-top: var(--space-lg);
  border-radius: var(--radius-md);
  border: var(--border-1) solid #dce3f1;
  background: #edf1f9;
  padding: var(--space-lg) var(--icon-md) var(--space-14);
}

.ac-age-block.is-attention {
  border-color: #ef8300;
  box-shadow: 0 0 0 2px rgba(239, 131, 0, 0.2);
}

.ac-age-block__head {
  display: flex;
  justify-content: space-between;
  gap: var(--space-sm);
  flex-wrap: wrap;
  font-size: var(--font-size-16);
  color: #2f3a56;
}

.ac-age-block__head span {
  color: #ef8300;
  overflow-wrap: anywhere;
}

.ac-age-bar {
  margin-top: var(--space-sm);
}

.ac-age-input {
  width: 100%;
  appearance: none;
  height: var(--space-5);
  border-radius: var(--radius-pill);
  background: #d8dee9;
  outline: none;
}

.ac-age-input::-webkit-slider-thumb {
  appearance: none;
  width: var(--space-xl);
  height: var(--space-xl);
  border-radius: 50%;
  border: var(--border-3) solid #fff;
  background: #f3b164;
  box-shadow: var(--ac-shadow-input-thumb);
  cursor: grab;
}

.ac-age-input::-moz-range-thumb {
  width: var(--space-xl);
  height: var(--space-xl);
  border-radius: 50%;
  border: var(--border-3) solid #fff;
  background: #f3b164;
  box-shadow: var(--ac-shadow-input-thumb);
  cursor: grab;
}

.ac-age-marks {
  margin-top: var(--space-6);
  display: flex;
  justify-content: space-between;
  color: #8d97ae;
  font-size: var(--font-size-16);
}

.ac-social-row {
  margin-top: var(--space-sm);
  display: flex;
  justify-content: flex-end;
  gap: var(--space-sm);
}

.ac-social {
  width: var(--size-34);
  height: var(--size-34);
  border-radius: 50%;
  color: #fff;
  display: grid;
  place-items: center;
  font-size: var(--font-size-chip);
  font-weight: 700;
  text-decoration: none;
}

.ac-social--vk { background: #40a8ee; }
.ac-social--tg { background: #3ab4e5; }
.ac-social--wa { background: #2fcb79; }
.ac-social--yt { background: #f94123; }
.ac-social--ig { background: linear-gradient(120deg, #f7bd3f, #ce37b8); }
.ac-social--dz { background: #f3ae1a; }

.ac-hero-right {
  position: relative;
  min-height: var(--hero-min-height);
  overflow: hidden;
}

.ac-hero-right__bg {
  position: absolute;
  inset: 0;
  background: url("https://static.tildacdn.com/tild3130-3234-4630-b533-343030653636/photo_2024-02-04_171.jpeg") center/cover no-repeat;
}

.ac-hero-right__scrim {
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, rgba(16, 22, 31, 0.18) 0%, rgba(16, 22, 31, 0.74) 100%);
}

.ac-hero-pill {
  appearance: none;
  position: absolute;
  z-index: 2;
  border-radius: var(--radius-lg);
  border: var(--border-1) solid rgba(255, 255, 255, 0.62);
  background: rgba(255, 255, 255, 0.95);
  padding: var(--space-lg) var(--space-xl);
  font-size: var(--font-size-base);
  font-weight: 700;
  font-family: inherit;
  color: #2c354d;
  line-height: 1;
}

.ac-hero-pill--left {
  top: var(--space-xl);
  left: var(--space-lg);
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: var(--space-sm);
}

.ac-hero-pill--right {
  top: var(--space-xl);
  right: var(--space-lg);
  color: #fff;
  background: linear-gradient(120deg, var(--ac-accent), var(--ac-accent-strong));
  border-color: transparent;
  display: inline-flex;
  align-items: center;
  gap: var(--space-sm);
}

.ac-contact-panel {
  position: absolute;
  top: var(--space-xl);
  left: var(--space-lg);
  z-index: 3;
  width: max-content;
  min-width: 246px;
  display: grid;
  align-items: start;
}

.ac-contact-panel .ac-hero-pill--left {
  position: relative;
  top: auto;
  left: auto;
  width: 100%;
  justify-content: space-between;
  min-height: 56px;
  border-radius: var(--radius-lg);
  transition: border-color 160ms ease-out, box-shadow 160ms ease-out;
}

.ac-contact-trigger__chevron {
  transition: transform 160ms ease-out;
}

.ac-contact-panel.is-open .ac-contact-trigger__chevron {
  transform: rotate(90deg);
}

.ac-contact-menu {
  margin-top: calc(var(--border-1) * -1);
  border: var(--border-1) solid rgba(255, 255, 255, 0.62);
  border-top: 0;
  border-radius: 0 0 var(--radius-lg) var(--radius-lg);
  background: rgba(255, 255, 255, 0.96);
  box-shadow: 0 14px 24px rgba(16, 23, 34, 0.18);
  padding: var(--space-xs);
  display: grid;
  gap: var(--space-xs);
  opacity: 0;
  transform: translateY(-8px);
  pointer-events: none;
  transition: opacity 160ms ease-out, transform 160ms ease-out;
}

.ac-contact-menu[hidden] {
  display: none !important;
}

.ac-contact-panel.is-open .ac-contact-menu {
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
}

.ac-contact-panel.is-open .ac-contact-trigger {
  border-bottom-left-radius: var(--radius-sm);
  border-bottom-right-radius: var(--radius-sm);
  border-color: rgba(255, 255, 255, 0.75);
  box-shadow: 0 8px 20px rgba(16, 23, 34, 0.16);
}

.ac-contact-menu__item {
  display: grid;
  grid-template-columns: var(--size-18) 1fr;
  gap: var(--space-sm);
  align-items: center;
  min-height: 38px;
  border: var(--border-1) solid #dbe2ef;
  border-radius: var(--radius-md);
  padding: 0 var(--space-sm);
  color: #2c354d;
  text-decoration: none;
  background: #fff;
  font-size: var(--font-size-base);
  font-weight: 600;
  transition: border-color 140ms ease-out, background-color 140ms ease-out, color 140ms ease-out;
}

.ac-contact-menu__item .ac-icon {
  width: var(--size-18);
  height: var(--size-18);
}

.ac-contact-menu__item:hover,
.ac-contact-menu__item:focus-visible {
  border-color: #ef8300;
  color: #dd7600;
  background: #fff8eb;
  outline: none;
}

.ac-hero-overlay {
  position: absolute;
  left: var(--space-lg);
  right: var(--space-lg);
  bottom: var(--space-lg);
  z-index: 2;
  color: #fff;
}

.ac-funnel-body {
  display: block;
}

.ac-hero-overlay h2 {
  margin: 0;
  font-size: var(--font-size-26);
  text-transform: uppercase;
  line-height: 1.2;
}

.ac-hero-overlay__line {
  margin-top: 0;
  color: #ffad3f;
  font-size: var(--font-size-11);
  font-weight: 700;
}

.ac-hero-overlay p {
  margin: var(--space-2xs) 0 var(--space-10);
  font-size: var(--font-size-14);
  line-height: var(--line-height-19-6);
}

.ac-hero-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--space-sm);
  margin-bottom: var(--space-md);
}

.ac-hero-grid__item {
  border: var(--border-1) solid rgba(255, 255, 255, 0.5);
  border-radius: var(--radius-sm);
  background: rgba(25, 31, 42, 0.42);
  display: flex;
  align-items: center;
  gap: var(--space-10);
  padding: var(--space-md) var(--space-10);
  font-size: var(--font-size-14);
  min-height: var(--size-82);
  align-items: flex-start;
}

.ac-hero-grid__copy {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.ac-hero-grid__copy strong {
  font-size: var(--font-size-lg);
  line-height: 1.2;
  font-weight: 700;
  color: #fff;
}

.ac-hero-grid__copy small {
  font-size: var(--font-size-base);
  line-height: 1.35;
  color: rgba(255, 255, 255, 0.94);
}

/* Dark hero area uses raster/inline SVG assets with dark strokes.
   Normalize icon contrast here to keep controls readable on dark backgrounds. */
.ac-hero-overlay .ac-icon,
.ac-hero-grid__item .ac-icon,
.ac-funnel-controls .ac-icon {
  filter: brightness(0) invert(1);
  opacity: 0.96;
}

.ac-funnel-controls {
  display: grid;
  grid-template-columns: var(--size-36) 1fr auto;
  gap: var(--space-10);
  align-items: center;
  padding: 0 var(--space-lg);
}

.ac-round-btn {
  width: var(--size-36);
  height: var(--size-36);
  border-radius: 50%;
  border: var(--border-1) solid var(--ac-border);
  background: #fff;
  color: var(--ac-chip-text);
  display: grid;
  place-items: center;
  cursor: grab;
}

.ac-round-btn:disabled {
  opacity: 0.45;
  cursor: default;
}

:where(
  .ac-primary-btn,
  .ac-round-btn:not(:disabled),
  .ac-hero-pill,
  .ac-direction-btn,
  .ac-shift-toggle,
  .ac-btn-soft,
  .ac-overlay-close,
  .ac-shift-item,
  .ac-social
):hover {
  transform: translateY(-1px);
  box-shadow: var(--ac-shadow-hover-soft);
  filter: brightness(1.02);
}

:where(
  .ac-primary-btn,
  .ac-round-btn:not(:disabled),
  .ac-hero-pill,
  .ac-direction-btn,
  .ac-shift-toggle,
  .ac-btn-soft,
  .ac-overlay-close,
  .ac-shift-item,
  .ac-social
):active {
  transform: translateY(0);
  box-shadow: var(--ac-shadow-press-soft);
  filter: brightness(0.99);
}

.ac-mode-toggle:hover {
  box-shadow: var(--ac-shadow-hover-soft);
}

.ac-mode-toggle:active {
  transform: translateY(0);
}

/* Accessible focus ring for keyboard navigation */
:where(
  .ac-mode-toggle,
  .ac-menu-item--compact,
  .ac-menu-item--full,
  .ac-primary-btn,
  .ac-round-btn,
  .ac-hero-pill,
  .ac-direction-btn,
  .ac-shift-toggle,
  .ac-btn-soft,
  .ac-overlay-close,
  .ac-shift-item,
  .ac-social
):focus-visible {
  outline: none;
  box-shadow: var(--ac-focus-ring), var(--ac-shadow-hover-soft);
}

.ac-menu-item--full.is-active:focus-visible {
  box-shadow: var(--ac-focus-ring), var(--ac-shadow-chip-active);
}

.ac-step-status {
  font-size: var(--font-size-12);
  font-weight: 600;
  color: rgba(245, 248, 255, 0.95);
}

.ac-primary-btn {
  border: 0;
  border-radius: var(--radius-pill);
  background: linear-gradient(120deg, var(--ac-accent), var(--ac-accent-strong));
  color: #fff;
  font: inherit;
  font-size: var(--font-size-13);
  font-weight: 700;
  padding: var(--font-size-11) var(--icon-md);
  height: var(--size-38);
  cursor: grab;
  white-space: nowrap;
}

.ac-primary-btn--cta {
  height: 48px;
  padding: 0 22px;
  font-size: var(--font-size-lg);
  border-radius: 999px;
  box-shadow: 0 8px 22px rgba(255, 119, 0, 0.36);
  display: inline-flex;
  align-items: center;
  gap: var(--space-sm);
}

.ac-primary-btn--intro {
  width: var(--size-36);
  min-width: var(--size-36);
  height: var(--size-36);
  border-radius: 50%;
  padding: 0;
  display: grid;
  place-items: center;
  background: rgba(26, 32, 45, 0.5);
  border: var(--border-1) solid rgba(255, 255, 255, 0.6);
}

body[data-mode="compact"] .ac-hero-overlay.is-intro {
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  display: block;
}

body[data-mode="compact"] .ac-hero-overlay.is-intro .ac-funnel-body {
  width: min(430px, calc(100% - var(--space-4xl)));
  margin: 0;
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  border: var(--border-1) solid rgba(255, 255, 255, 0.45);
  border-radius: var(--radius-lg);
  background: rgba(52, 66, 86, 0.34);
  backdrop-filter: blur(8px);
  text-align: center;
  padding: var(--space-2xl) var(--space-xl);
  display: flex;
  flex-direction: column;
  align-items: center;
}

body[data-mode="compact"] .ac-hero-overlay.is-intro h2 {
  font-size: var(--font-size-h2);
  line-height: 1;
  margin-bottom: var(--space-sm);
  text-transform: none;
}

body[data-mode="compact"] .ac-hero-overlay.is-intro .ac-hero-overlay__line {
  margin-top: 0;
  color: #fff;
  font-size: var(--font-size-26);
  font-weight: 700;
  line-height: 1.1;
  text-transform: none;
}

body[data-mode="compact"] .ac-hero-overlay.is-intro p {
  margin-top: var(--space-md);
  margin-bottom: 0;
  color: rgba(255, 255, 255, 0.9);
  font-size: var(--font-size-base);
  line-height: 1.35;
}

body[data-mode="compact"] .ac-hero-overlay.is-intro .ac-hero-grid {
  display: none;
}

body[data-mode="compact"] .ac-hero-overlay.is-intro .ac-funnel-controls {
  width: auto;
  position: absolute;
  left: var(--space-lg);
  right: var(--space-lg);
  bottom: var(--space-lg);
  margin: 0;
  padding: 0;
  align-items: end;
}

body[data-mode="compact"] .ac-hero-right.is-intro .ac-hero-right__bg {
  transform: scale(1.06);
  transform-origin: center;
}

.ac-section {
  padding-top: var(--section-pad-y);
  padding-bottom: var(--section-pad-y);
}

.ac-section .ac-container {
  width: min(var(--section-container-max), calc(100% - (var(--container-padding-desktop) * 2)));
}

.ac-section h2 {
  margin: 0 0 var(--space-md);
  font-size: var(--font-size-h2);
  line-height: 1.1;
}

.ac-grid {
  display: grid;
  gap: var(--icon-md);
}

.ac-grid--3 {
  grid-template-columns: repeat(3, minmax(0, 1fr));
}

.ac-grid--4 {
  grid-template-columns: repeat(4, minmax(0, 1fr));
}

.ac-media-toolbar {
  display: flex;
  align-items: center;
  gap: var(--space-sm);
  margin-bottom: var(--space-md);
  flex-wrap: wrap;
}

.ac-media-row {
  display: grid;
  grid-template-columns: var(--size-36) minmax(0, 1fr) var(--size-36);
  align-items: center;
  gap: var(--space-sm);
}

.ac-filter-chip {
  border: var(--border-1) solid var(--ac-border);
  border-radius: var(--radius-sm);
  background: #fff;
  color: var(--ac-chip-text);
  height: var(--chip-height);
  padding: 0 var(--chip-padding-x);
  font: inherit;
  font-size: var(--font-size-chip);
  font-weight: 700;
  line-height: var(--line-height-chip);
  display: inline-flex;
  align-items: center;
  gap: var(--space-xs);
  flex-shrink: 0;
  cursor: grab;
  white-space: nowrap;
}

.ac-filter-chip.is-active {
  color: #ef8300;
  border-color: var(--ac-border);
  background: #fff;
  box-shadow: none;
}

.ac-nav-btn {
  width: var(--size-36);
  height: var(--size-36);
  border-radius: 50%;
  border: var(--border-1) solid var(--ac-border);
  background: #fff;
  display: grid;
  place-items: center;
  cursor: grab;
}

.ac-nav-btn:disabled {
  opacity: 0.45;
  cursor: default;
}

.ac-ai-stat-card {
  background: #fff9ef;
}

.ac-ai-big {

  font-weight: 700;
  color: #ef8300;
  margin-bottom: var(--space-sm);
}

.ac-ai-label {
  font-size: var(--font-size-base);
  line-height: 1.3;
  font-weight: 700;
  margin-bottom: var(--space-sm);
}

.ac-ai-mini-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: var(--space-sm);
}

.ac-ai-mini {
  border: var(--border-1) solid #edf0f7;
  border-radius: var(--radius-sm);

}

.ac-ai-mini__value {

  font-size: var(--font-size-base);
  font-weight: 700;
}

.ac-ai-mini__label {
  color: #5a6784;
  font-size: var(--font-size-body-sm);

}

.ac-ai-copy p + p {

}

.ac-map-frame {
  width: 100%;
  height: 100%;
  min-height: var(--map-min-height);
  border: 0;
  border-radius: var(--radius-md);
}

.ac-photo-strip {
  display: grid;

}

.ac-photo-strip img {

  object-fit: cover;
  border-radius: var(--radius-lg);
  border: var(--border-1) solid var(--ac-border);
}

.ac-photo-thumb {
  border: 0;
  background: transparent;
  padding: 0;
  cursor: grab;
}

.ac-video-grid {
  gap: var(--space-md);
}

.ac-video-card {

  position: relative;
  overflow: hidden;
  background: #000;
}

.ac-video-card__poster {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: inherit;
}

.ac-video-card__frame {
  width: 100%;
  height: 100%;
  border: 0;
  border-radius: inherit;
  display: block;
}

.ac-video-card__play {

  width: var(--space-4xl);
  height: var(--space-4xl);

  border: 0;
  background: linear-gradient(120deg, var(--ac-accent), var(--ac-accent-strong));

  place-items: center;
  cursor: grab;
}

.ac-video-card__caption {
  position: absolute;
  left: var(--space-md);
  right: var(--space-md);
  bottom: var(--space-md);

  line-height: 1.35;
}

.ac-review-card {

}

.ac-review-card__avatar {
  width: 100%;
  max-height: 220px;
  min-height: 220px;
  border-radius: var(--radius-md);
  object-fit: cover;
  display: block;
  margin: 0 auto var(--space-sm);
}

.ac-review-card__quote {
  font-size: var(--font-size-body-sm);
  line-height: 1.5;
  margin-bottom: var(--space-sm);
}

.ac-review-card__name {
  font-weight: 700;
  font-size: var(--font-size-base);
  margin-bottom: var(--space-2xs);
}

.ac-review-card__meta {
  color: #7b879f;
  font-size: var(--font-size-chip);
  margin-bottom: var(--space-xs);
}

.ac-review-card__stars {
  color: #ef8300;
  font-size: var(--font-size-chip);
  letter-spacing: var(--space-2xs);
}

.ac-team-card {
  text-align: center;
}

.ac-team-card__avatar {
  width: 100%;
  max-height: 220px;
  object-fit: cover;
  border-radius: var(--radius-md);
  margin-bottom: var(--space-sm);
}

.ac-team-card__role {
  color: #ef8300;
  font-size: var(--font-size-body-sm);
  margin-bottom: var(--space-xs);
}

.ac-faq-item {
  border: var(--border-1) solid var(--ac-border);
  border-radius: var(--radius-pill);
  background: #fff;
  padding: var(--space-sm) var(--space-lg);
}

.ac-faq-item summary {
  cursor: grab;
  font-weight: 700;
  font-size: var(--font-size-body-sm);
}

.ac-card h3 {
  margin: 0 0 var(--space-10);
  font-size: var(--font-size-h3);
}

.ac-card p,
.ac-card li {
  margin: 0;
  color: #5a6784;
  font-size: var(--font-size-13);
  line-height: var(--line-height-21-45);
}

.ac-card--hero .ac-hero-subtitle {
  margin: 0 0 var(--space-6);
  font-size: var(--font-size-12-97);
  line-height: var(--line-height-20-752);
}

.ac-card ul {
  margin: 0;
  padding-left: var(--space-lg);
  display: grid;
  gap: var(--space-6);
}

.ac-card--map {
  min-height: var(--map-min-height);
  background: linear-gradient(120deg, #d0d9e7, #eff3fc);
}

.ac-card--team {

}

.ac-faq-list {
  display: grid;
  gap: var(--space-sm);
}

.ac-faq-list details {
  border: var(--border-1) solid var(--ac-border);
  background: #fff;
  border-radius: var(--radius-pill);

}

.ac-faq-list summary {
  cursor: grab;
  font-weight: 700;
}

.ac-section--focus h2 {
  color: #eb7d00;
}

.ac-overlay-root {

  inset: 0;
  pointer-events: none;
  z-index: 90;
}

.ac-overlay-backdrop {
  position: absolute;
  inset: 0;
  background: rgba(22, 28, 40, 0.62);

  place-items: center;
  padding: var(--space-lg);
  pointer-events: auto;
}

.ac-overlay-card {
  width: min(var(--overlay-max-width), 100%);
  max-height: calc(100vh - 32px);

  border-radius: var(--radius-lg);
  border: var(--border-1) solid #dbe1ef;

}

.ac-overlay-card--photo {

.ac-overlay-head {

  justify-content: space-between;
  align-items: center;
  gap: var(--space-md);
  margin-bottom: var(--space-md);
}

.ac-overlay-title {
  margin: 0;
  font-size: var(--font-size-overlay-title);
}

.ac-overlay-close {
  width: var(--size-close);
  height: var(--size-close);
  border-radius: 50%;
  border: var(--border-1) solid var(--ac-border);
  background: #fff;
  cursor: grab;
  display: grid;
  place-items: center;
}

.ac-photo-lightbox {

  gap: var(--space-md);

.ac-photo-lightbox__image {
  width: 100%;
  max-height: 72vh;
  object-fit: contain;
  border-radius: var(--radius-md);

}

.ac-contact-dropdown {
  border: var(--border-1) solid var(--ac-border);
  border-radius: var(--radius-sm);
  padding: var(--space-sm) var(--space-md);

}

.ac-contact-dropdown summary {

.ac-contact-list {

  gap: var(--space-sm);
  margin-top: var(--space-sm);
}

.ac-contact-item {

  grid-template-columns: auto 1fr;
  gap: var(--space-sm);

.ac-contact-item__dot {
  color: #ef8300;
  font-size: var(--font-size-lg);

.ac-contact-item strong {

.ac-contact-item small {

.ac-direction-row {

  cursor: grab;

.ac-direction-btn.is-active {

  background: #fff8ec;
  color: #dd7600;
}

.ac-overlay-meta {
  color: #5f6c87;
  font-size: var(--font-size-overlay-meta);
  margin-bottom: var(--space-md);
}

.ac-shift-toolbar {

  gap: var(--space-md);
  margin-bottom: var(--space-sm);
}

.ac-shift-toggle {
  border: var(--border-1) solid var(--ac-border);
  border-radius: var(--radius-sm);
  background: #fff;
  color: #56627f;
  padding: var(--space-sm) var(--space-md);
  font: inherit;
  font-size: var(--font-size-body-sm);
  font-weight: 700;
  cursor: grab;
}

.ac-shift-list {
  display: grid;
  gap: var(--space-sm);
}

.ac-shift-list--grid {
  grid-template-columns: repeat(2, minmax(0, 1fr));

}

.ac-shift-item {
  border: var(--border-1) solid var(--ac-border);
  border-radius: var(--radius-sm);
  background: #fff;
  display: block;
  gap: var(--space-md);

  cursor: grab;
  text-align: left;
}

.ac-shift-item.is-active {

.ac-shift-item--compact {

.ac-shift-item--featured {

.ac-shift-item__select {

  padding: 0;

.ac-shift-item__body {

  gap: var(--space-2xs);

.ac-shift-item__line {

.ac-shift-item__name {

.ac-shift-item__days {

  font-size: var(--font-size-body-sm);

.ac-shift-item__badge {

.ac-shift-item__meta {

  font-size: var(--font-size-body-sm);

.ac-shift-item__promo {

  font-size: var(--font-size-body-sm);
  line-height: 1.3;

.ac-shift-item--featured__left {

.ac-shift-item--featured__right {

  grid-template-rows: auto auto auto 1fr;
  gap: 8px;

.ac-shift-item__occupancy {
  display: grid;
  gap: 4px;
}

.ac-shift-item__occupancy-title {
  color: #5f6c87;
  font-size: 12px;
  line-height: 1.2;
}

.ac-shift-item__occupancy-kpi {
  display: grid;
  grid-template-columns: auto 1fr;
  align-items: center;
  gap: 10px;
}

.ac-shift-item__occupancy-kpi strong {
  color: #ef8300;
  font-size: 32px;
  line-height: 1;
  font-weight: 800;
}

.ac-shift-item__occupancy-bar {
  height: 8px;
  border-radius: 999px;
  background: #e8edf7;
  overflow: hidden;
}

.ac-shift-item__occupancy-bar > span {
  display: block;
  height: 100%;
  background: #35c768;
  transition: width 220ms ease-out;
}

.ac-shift-item__occupancy-meta {
  color: #5f6c87;
  font-size: 12px;
  line-height: 1.2;
}

.ac-shift-item__price-caption {
  color: #5f6c87;
  font-size: 12px;
  line-height: 1.2;
  text-align: center;
}

.ac-shift-item__price-shell {
  border: var(--border-1) solid #f3dcc1;

.ac-shift-item__price {
  color: #dd7600;
  font-size: 42px;
  font-weight: 800;
  line-height: 1;
  text-align: center;
  white-space: nowrap;

  function sliderValueToAge(sliderValue) {

  function ageToSliderValue(age) {

      if (SHIFTS[i].id === shiftId) {
        return SHIFTS[i];
      }
    }
    return SHIFTS[0];
  }

  function findExactShiftById(shiftId) {

  function getHeroBenefits() {
    var profile = findProfileByAge(state.age);
    if (state.step === 0) {
      return profile.benefits;

    var shift = getCurrentShift();
    if (shift && shift.benefits && shift.benefits.length) {
      return shift.benefits;
    }
    return profile.benefits;

  function getHeroSlides() {
    var fallback = "https://static.tildacdn.com/tild3130-3234-4630-b533-343030653636/photo_2024-02-04_171.jpeg";
    var list = [fallback];
    var seen = {};
    seen[fallback] = true;
    var photos = CONTENT_MAP.photos || [];
    for (var i = 0; i < photos.length; i += 1) {
      var src = photos[i] && photos[i].src;
      if (!src || seen[src]) continue;
      seen[src] = true;
      list.push(src);
      if (list.length >= 8) break;
    }
    return list;

  function randomFloat(min, max) {
    return min + Math.random() * (max - min);
  }

  function formatPriceNumber(value) {
    return (Math.round(Number(value) || 0)).toLocaleString("ru-RU") + " ₽";
  }

  function generatePromoCode() {
    return "AIDA-" + String(Math.floor(1000 + Math.random() * 9000));
  }

  function loadShiftPromo() {
    try {
      var raw = localStorage.getItem(SHIFT_PROMO_STORAGE_KEY);
      if (!raw) return null;
      var data = JSON.parse(raw);
      if (!data || typeof data !== "object") return null;
      if (data.status === "active" && Number(data.expiresAt || 0) > 0 && Number(data.expiresAt) <= Date.now()) {
        localStorage.removeItem(SHIFT_PROMO_STORAGE_KEY);
        return null;
      }
      return data;
    } catch (_err) {
      return null;
    }
  }

  function saveShiftPromo(promo) {
    try {
      localStorage.setItem(SHIFT_PROMO_STORAGE_KEY, JSON.stringify(promo));
    } catch (_err) {
      // ignore storage errors
    }
  }

  function getShiftPriceMeta(shift, idx) {
    var fallback = SHIFT_PRICE_META[idx] || SHIFT_PRICE_META[0];
    var finalPrice = fallback.finalPrice;
    var basePrice = Math.round(finalPrice * (1 + SHIFT_PRICE_CFG.initialMarkup));
    var totalSeats = 45;
    var seatsLeft = Math.max(0, Number(fallback.seats || 0));
    var reserved = Math.max(0, totalSeats - seatsLeft);
    return {
      date: fallback.date,
      days: fallback.days,
      seats: fallback.seats,
      badge: fallback.badge,
      finalPrice: finalPrice,
      basePrice: basePrice,
      shiftName: shift.summary || shift.line,
      monthLabel: fallback.monthLabel || "",
      monthIndex: Number(fallback.monthIndex || 0),
      year: Number(fallback.year || 2026),
      startDay: Number(fallback.startDay || 1),
      endDay: Number(fallback.endDay || 1),
      occupancyPercent: Math.round((reserved / totalSeats) * 100),
      occupancyLine: reserved + " из " + totalSeats + " мест"
    };
  }

  function buildShiftCalendarMarkup(meta, shiftId) {
    var weekdays = ["Пн", "Вт", "Ср", "Чт", "Пт", "Сб", "Вс"];
    var firstDate = new Date(meta.year, meta.monthIndex, 1);
    var monthWeekday = (firstDate.getDay() + 6) % 7;
    var daysInMonth = new Date(meta.year, meta.monthIndex + 1, 0).getDate();
    var dayCells = "";
    var i;

    for (i = 0; i < monthWeekday; i += 1) {
      dayCells += '<span class="ac-shift-calendar__day ac-shift-calendar__day--empty"></span>';
    }

    for (i = 1; i <= daysInMonth; i += 1) {
      var isInRange = i >= meta.startDay && i <= meta.endDay;
      var isEdge = i === meta.startDay || i === meta.endDay;
      var dayClass = "ac-shift-calendar__day";
      if (isInRange) {
        dayClass += " is-range";
      }
      if (isEdge) {
        dayClass += " is-edge";
      }
      dayCells += '<span class="' + dayClass + '">' + i + "</span>";
    }

    var weekdayCells = "";
    for (i = 0; i < weekdays.length; i += 1) {
      weekdayCells += "<span>" + weekdays[i] + "</span>";
    }

    return (
      '<div class="ac-shift-calendar" data-shift-calendar-root="' + shiftId + '">' +
      '<div class="ac-shift-calendar__head">' +
      '<strong>Календарь смены</strong>' +
      '<button class="ac-shift-calendar__close" type="button" data-action="shift-calendar-close" aria-label="Закрыть календарь">×</button>' +
      "</div>" +
      '<div class="ac-shift-calendar__month">' + meta.monthLabel + "</div>" +
      '<div class="ac-shift-calendar__weekdays">' + weekdayCells + "</div>" +
      '<div class="ac-shift-calendar__grid">' + dayCells + "</div>" +
      "</div>"
    );
  }

  function formatPromoTtl(expiresAt) {
    var leftMs = Math.max(0, Number(expiresAt || 0) - Date.now());
    var totalSeconds = Math.floor(leftMs / 1000);
    var hours = Math.floor(totalSeconds / 3600);
    var minutes = Math.floor((totalSeconds % 3600) / 60);
    var seconds = totalSeconds % 60;
    return String(hours).padStart(2, "0") + ":" + String(minutes).padStart(2, "0") + ":" + String(seconds).padStart(2, "0");
  }

  function getPromoRemainingMs(promo) {
    if (!promo || promo.status !== "active") return 0;
    return Math.max(0, Number(promo.expiresAt || 0) - Date.now());
  }

  function stopPromoTicker() {
    if (!promoTicker) return;
    clearInterval(promoTicker);
    promoTicker = null;
  }

  function startPromoTicker() {
    if (promoTicker) return;
    promoTicker = setInterval(function () {
      var promo = loadShiftPromo();
      if (!promo || promo.status !== "active") {
        stopPromoTicker();
        return;
      }
      if (getPromoRemainingMs(promo) <= 0) {
        try {
          localStorage.removeItem(SHIFT_PROMO_STORAGE_KEY);
        } catch (_err) {
          // ignore storage errors
        }
        stopPromoTicker();
        renderInfoCard();
        renderOverlays();
        return;
      }
      if (state.overlays.shifts) {
        var ttlText = "Действует: " + formatPromoTtl(promo.expiresAt || 0);
        var ttlNodes = document.querySelectorAll(".ac-shift-item__promo-ttl");
        for (var i = 0; i < ttlNodes.length; i += 1) {
          var node = ttlNodes[i];
          if (!node) continue;
          if (String(node.textContent || "").indexOf("Действует:") !== 0) continue;
          node.textContent = ttlText;
        }
      }
    }, 1000);
  }

  function getShiftPromoView(shiftId, meta) {
    var promo = loadShiftPromo();
    if (!promo || promo.shiftId !== shiftId) {
      return {
        stage: 0,
        status: "draft",
        price: meta.basePrice,
        oldPrice: "",
        code: "",
        actionText: "Показать мою цену",
        metaText: "Нажмите — найдём персональную цену"
      };
    }

    var stage = Number(promo.priceStage || 0);
    var status = String(promo.status || "draft");
    var price = Number(promo.finalPrice || meta.basePrice);
    var oldPrice = stage > 0 ? formatPriceNumber(meta.basePrice) : "";

    if (status === "active") {
      return {
        stage: stage,
        status: status,
        price: price,
        oldPrice: oldPrice,
        code: String(promo.code || ""),
        actionText: "Зафиксировано — бронировать",
        metaText: "Промокод: " + String(promo.code || ""),
        promoTtl: formatPromoTtl(promo.expiresAt || 0)
      };
    }

    if (stage >= 2) {
      return {
        stage: stage,
        status: status,
        price: price,
        oldPrice: oldPrice,
        code: String(promo.code || ""),
        actionText: "Зафиксировать цену на 72 ч",
        metaText: "Найдена лучшая цена",
        promoTtl: "Активируется после фиксации"
      };
    }

    if (stage === 1) {
      return {
        stage: stage,
        status: status,
        price: price,
        oldPrice: oldPrice,
        code: String(promo.code || ""),
        actionText: "Улучшить цену ещё раз",
        metaText: "Осталась 1 попытка"
      };
    }

    return {
      stage: 0,
      status: "draft",
      price: meta.basePrice,
      oldPrice: "",
      code: "",
      actionText: "Показать мою цену",
      metaText: "Нажмите — найдём персональную цену"
    };
  }

  function applyShiftPriceStep(shiftId) {
    var shift = findShiftById(shiftId);
    var idx = SHIFTS.indexOf(shift);
    if (!shift || idx < 0) return;

    var meta = getShiftPriceMeta(shift, idx);
    var promo = loadShiftPromo();
    var same = promo && promo.shiftId === shiftId;
    var stage = same ? Number(promo.priceStage || 0) : 0;
    var status = same ? String(promo.status || "draft") : "draft";

    if (status === "active") {
      setOverlay("shifts", false);
      setStep(SHIFTS.length - 1);
      return;
    }

    var nextPromo = {
      shiftId: shift.id,
      shiftName: shift.summary || shift.line,
      age: clamp(Number((same && promo && promo.age) || state.age || 7), 7, 14),
      basePrice: meta.basePrice,
      finalPrice: same ? Number(promo.finalPrice || meta.basePrice) : meta.basePrice,
      code: same && promo.code ? String(promo.code) : generatePromoCode(),
      priceStage: same ? stage : 0,
      status: "draft",
      createdAt: same && promo.createdAt ? Number(promo.createdAt) : Date.now(),
      activatedAt: null,
      expiresAt: null
    };

    if (stage <= 0) {
      var firstDisc = randomFloat(SHIFT_PRICE_CFG.firstDiscMin, SHIFT_PRICE_CFG.firstDiscMax);
      nextPromo.finalPrice = Math.round(meta.finalPrice * (1 - firstDisc));
      nextPromo.priceStage = 1;
    } else if (stage === 1) {
      var secondDisc = randomFloat(SHIFT_PRICE_CFG.secondDiscMin, SHIFT_PRICE_CFG.secondDiscMax);
      nextPromo.finalPrice = Math.max(
        Math.round(Number(nextPromo.finalPrice) * (1 - secondDisc)),
        Math.round(meta.finalPrice * 0.88)
      );
      nextPromo.priceStage = 2;
    } else {
      var nowTs = Date.now();
      nextPromo.priceStage = 2;
      nextPromo.status = "active";
      nextPromo.activatedAt = nowTs;
      nextPromo.expiresAt = nowTs + SHIFT_PRICE_CFG.holdHours * 3600000;
    }

    saveShiftPromo(nextPromo);
    state.selectedShiftId = shift.id;
    state.direction = shift.direction;
    renderOverlays();
  }

  function stopHeroSlideshow() {
    if (!heroSlideTimer) return;
    clearInterval(heroSlideTimer);
    heroSlideTimer = null;
  }

  function startHeroSlideshow() {
    var baseLayer = document.querySelector(".ac-hero-right__bg--base");
    var fadeLayer = document.querySelector(".ac-hero-right__bg--fade");
    if (!baseLayer || !fadeLayer) return;

    var slides = getHeroSlides();
    if (!slides.length) return;

    heroSlideIndex = clamp(heroSlideIndex, 0, slides.length - 1);
    baseLayer.style.backgroundImage = 'url("' + slides[heroSlideIndex] + '")';
    fadeLayer.style.backgroundImage = "";
    fadeLayer.classList.remove("is-active");

    if (slides.length < 2) return;
    stopHeroSlideshow();

    if (!fadeLayer.dataset.crossfadeBound) {
      fadeLayer.addEventListener("transitionend", function (event) {
        if (event.propertyName !== "opacity") return;
        if (!fadeLayer.classList.contains("is-active")) return;
        baseLayer.style.backgroundImage = fadeLayer.style.backgroundImage;
        fadeLayer.classList.remove("is-active");
      });
      fadeLayer.dataset.crossfadeBound = "1";
    }

    heroSlideTimer = window.setInterval(function () {
      var nextIndex = (heroSlideIndex + 1) % slides.length;
      fadeLayer.style.backgroundImage = 'url("' + slides[nextIndex] + '")';
      fadeLayer.classList.add("is-active");
      heroSlideIndex = nextIndex;
    }, HERO_SLIDE_INTERVAL_MS);
  }
  function hasTab(tabKey) {
    for (var i = 0; i < TABS.length; i += 1) {
      if (TABS[i].key === tabKey) {
        return true;
      }
    }
    return false;
  }

  function setMode(mode) {
    if (mode !== "compact" && mode !== "full") return;
    if (state.mode === mode) return;

    state.mode = mode;
    persistMode(mode);

    renderLayout();
    renderMenu();
    renderSections();

    track("mode_changed", {
      mode: state.mode
    });

    if (auditRuntime.active && typeof auditRuntime.stageSync === "function") {
      auditRuntime.stageSync();
    }
  }

  function setActiveTab(tabKey) {
    if (!hasTab(tabKey) || tabKey === state.activeTab) return;

    state.activeTab = tabKey;

    renderMenu();
    renderSections();

    track("tab_changed", {
      tab: state.activeTab,
      mode: state.mode
    });
  }

  function applyStepTransition(nextStep, withFunnelStartTracking) {
    var prevStep = state.step;
    var safeStep = clamp(nextStep, 0, SHIFTS.length - 1);
    if (safeStep === state.step) return false;

    state.step = safeStep;
    var shift = getCurrentShift();
    state.selectedShiftId = shift.id;
    state.direction = shift.direction;

    renderInfoCard();
    renderFunnel();

    if (withFunnelStartTracking && prevStep === 0 && safeStep > 0) {
      track("funnel_started", {
        from_step: prevStep + 1,
        to_step: safeStep + 1,
        mode: state.mode
      });
    }

    track("step_changed", {
      step: state.step + 1,
      total_steps: SHIFTS.length,
      direction: state.direction,
      shift_id: state.selectedShiftId
    });

    return true;
  }

  function setStep(nextStep) {
    var changed = applyStepTransition(nextStep, true);
    if (changed && auditRuntime.active && typeof auditRuntime.stageSync === "function") {
      auditRuntime.stageSync();
    }
  }

  function setAge(nextAge) {
    var wasLocked = isAgeGateLocked();
    var safeAge = clamp(nextAge, 7, 14);
    if (safeAge === state.age && !wasLocked) return;

    state.age = safeAge;
    ageSelectionConfirmed = true;
    ageGateNudge = false;
    persistAge(safeAge);
    if (auditRuntime.active) {
      auditRuntime.ageSelected = true;
    }

    renderInfoCard();
    renderFunnel();

    track("age_selected", {
      age: state.age,
      profile_id: findProfileByAge(state.age).id
    });

    if (wasLocked && state.step === 0) {
      applyStepTransition(1, true);
    }

    if (auditRuntime.active && typeof auditRuntime.stageSync === "function") {
      auditRuntime.stageSync();
    }
  }

  function setShiftView(view) {
    if (view !== "list" && view !== "grid") return;
    if (state.shiftView === view) return;

    state.shiftView = view;

    renderOverlays();

    track("shift_view_changed", {
      shift_view: state.shiftView
    });
  }

  function setSelectedShift(shiftId) {
    var shift = findShiftById(shiftId);
    var targetStep = SHIFTS.indexOf(shift);
    var changed = false;

    if (state.selectedShiftId !== shift.id) {
      state.selectedShiftId = shift.id;
      state.direction = shift.direction;
      shiftCalendar.open = false;
      shiftCalendar.shiftId = "";
      changed = true;
    }

    if (targetStep !== state.step) {
      applyStepTransition(targetStep, false);
      changed = true;
    }

    if (!changed) return;

    renderOverlays();

    track("shift_selected", {
      shift_id: state.selectedShiftId,
      direction: state.direction,
      step: state.step + 1
    });
  }

  function setDirection(directionId) {
    if (state.direction === directionId) return;

    state.direction = directionId;
    shiftsShowAll = false;

    renderOverlays();

    track("direction_selected", {
      direction: state.direction
    });
  }

  function setOverlay(name, isOpen) {
    if (!hasOwn(state.overlays, name)) return;

    var changed = false;

    if (isOpen) {
      if (name === "shifts") {
        shiftsShowAll = false;
        var promo = loadShiftPromo();
        if (promo && promo.shiftId) {
          var promoShift = findExactShiftById(promo.shiftId);
          if (promoShift) {
            state.selectedShiftId = promoShift.id;
            state.direction = promoShift.direction;
          }
        }
        if (state.direction !== "all") {
          state.direction = "all";
        }
      }
      if (state.photoLightboxIndex >= 0) {
        state.photoLightboxIndex = -1;
        changed = true;
      }
      for (var key in state.overlays) {
        if (!hasOwn(state.overlays, key)) continue;
        if (state.overlays[key]) {
          state.overlays[key] = false;
          changed = true;
        }
      }
    }

    if (state.overlays[name] !== isOpen) {
      state.overlays[name] = isOpen;
      changed = true;
    }

    if (changed) {
      if (name === "contact") {
        if (!isOpen) {
          clearContactCloseTimer();
        }
        renderLayout();
      }

      renderOverlays();

      if (name === "shifts" && isOpen) {
        track("booking_opened", {
          step: state.step + 1,
          shift_id: state.selectedShiftId,
          direction: state.direction
        });
      }
    }
  }

    if (state.photoLightboxIndex >= 0) {
      state.photoLightboxIndex = -1;
      changed = true;
    }

    for (var key in state.overlays) {
      if (!hasOwn(state.overlays, key)) continue;
      if (state.overlays[key]) {
        state.overlays[key] = false;
        changed = true;

    if (changed) {
      clearContactCloseTimer();
      renderLayout();
      renderOverlays();

  function renderFunnel() {
    var shift = getCurrentShift();
    var isIntroStep = state.step === 0;
    var gateLocked = isAgeGateLocked();
    var profile = findProfileByAge(state.age);

    var overlayTitle = document.getElementById("acHeroOverlayTitle");
    var line = document.getElementById("acProgramLine");
    var summary = document.getElementById("acProgramSummary");
    var status = document.getElementById("acStepStatus");
    var nextBtn = document.getElementById("acStepNextBtn");
    var prevBtn = document.querySelector('[data-action="step-prev"]');
    var overlay = document.querySelector(".ac-hero-overlay");
    var heroRight = document.querySelector(".ac-hero-right");

    if (overlay) {
      overlay.classList.toggle("is-intro", isIntroStep);
    }
    if (heroRight) {
      heroRight.classList.toggle("is-intro", isIntroStep && state.mode === "compact");
    }

    if (isIntroStep) {
      if (overlayTitle) overlayTitle.textContent = gateLocked ? "Выберите возраст ребёнка" : profile.ageText;
      if (line) line.textContent = gateLocked ? "Передвиньте слайдер на карточке слева" : "Описание смены";
      if (summary) {
        summary.textContent = gateLocked
          ? "Нажмите подходящий возраст, чтобы открыть шаг 2 и доступ к остальным действиям."
          : profile.subtitle;
      }
    } else {
      if (overlayTitle) overlayTitle.textContent = CONTENT_MAP.ui.heroOverlayTitle;
      if (line) line.textContent = shift.line;
      if (summary) summary.textContent = shift.summary;
    }

    if (status) {
      var visualTotalSteps = 2;
      var visualStep = state.step === 0 ? 1 : 2;
      status.textContent =
        CONTENT_MAP.ui.stepLabel + " " + String(visualStep) + " " + CONTENT_MAP.ui.stepLabelDelimiter + " " + String(visualTotalSteps);
    }

    if (nextBtn) {
      nextBtn.disabled = gateLocked;
      nextBtn.setAttribute("aria-disabled", String(gateLocked));
      if (isIntroStep) {
        nextBtn.classList.add("ac-primary-btn--intro");
        nextBtn.classList.remove("ac-primary-btn--cta");
        nextBtn.innerHTML =
          '<img class="ac-icon ac-icon--sm" src="' +
          ICON_MAP.chevronRight +
          '" alt="" aria-hidden="true">';
        nextBtn.setAttribute("aria-label", "Следующий шаг");
      } else {
        nextBtn.classList.remove("ac-primary-btn--intro");
        nextBtn.classList.add("ac-primary-btn--cta");
        nextBtn.innerHTML =
          '<span>' +
          CONTENT_MAP.ui.finalBookingCta +
          '</span><img class="ac-icon ac-icon--sm" src="' +
          ICON_MAP.chevronRight +
          '" alt="" aria-hidden="true">';
        nextBtn.removeAttribute("aria-label");
      }
    }

    if (prevBtn) {
      var prevLocked = gateLocked || state.step === 0;
      prevBtn.disabled = prevLocked;
      prevBtn.setAttribute("aria-disabled", String(prevLocked));
    }
  }

  function renderShiftOverlay() {
    var allShifts = SHIFTS.slice(0, 4);

    if (!visibleShifts.length) {
      return "";
    }

    var profile = findProfileByAge(state.age);
    var ageTitle = "СМЕНЫ ДЛЯ " + profile.min + "-" + profile.max + " ЛЕТ";
    var featuredShiftId = state.selectedShiftId;
    if (!shiftsShowAll) {
      var featuredShiftObj = findShiftById(featuredShiftId);
      var featuredInVisible = false;
      for (var vf = 0; vf < visibleShifts.length; vf += 1) {
        if (visibleShifts[vf].id === featuredShiftId) {
          featuredInVisible = true;
          break;
        }
      }
      if (featuredShiftObj && !featuredInVisible) {
        if (visibleShifts.length === 1) {
          visibleShifts.push(featuredShiftObj);
        } else {
          visibleShifts[visibleShifts.length - 1] = featuredShiftObj;
        }
      }
    }
    var featuredFound = false;
    for (var f = 0; f < visibleShifts.length; f += 1) {
      if (visibleShifts[f].id === featuredShiftId) {
        featuredFound = true;
        break;
      }
    }
    if (!featuredFound) {
      featuredShiftId = visibleShifts[0].id;

    function renderCompactShiftItem(shift, meta) {
      return (
        '<button class="ac-shift-item ac-shift-item--compact' +

        '<div class="ac-shift-item__occupancy-kpi">' +
        '<strong>' + occupancyPercent + "%</strong>" +
        '<div class="ac-shift-item__occupancy-bar"><span style="width:' + occupancyPercent + '%;"></span></div>' +
        "</div>" +
        '<div class="ac-shift-item__occupancy-meta">' + occupancyLine + "</div>" +

        "</div>" +
        '<div class="ac-shift-item--featured__right">' +

      if (shift.id === featuredShiftId) {

    return (

      '<article class="ac-overlay-card ac-overlay-card--shifts" role="dialog" aria-modal="true" aria-label="' +
      CONTENT_MAP.ui.shiftsTitle +
      '">' +
      '<div class="ac-overlay-head">' +
      '<h3 class="ac-overlay-title ac-overlay-title--shifts">' +
      ageTitle +
      '</h3>' +
      '<button class="ac-overlay-close" type="button" data-action="overlay-close" aria-label="' + CONTENT_MAP.ui.closeAria + '">' +
      '<img class="ac-icon ac-icon--sm" src="' +
      ICON_MAP.close +
      '" alt="" aria-hidden="true">' +
      "</button>" +
      "</div>" +
      '<div class="ac-shift-list ac-shift-list--compact">' +
      listHtml +
      "</div>" +
      (allShifts.length > 2
        ? '<button class="ac-shift-more-btn" type="button" data-action="shift-show-more">' +
          (shiftsShowAll
            ? "Скрыть дополнительные смены"
            : 'Показать ещё 2 смены <img class="ac-icon ac-icon--sm ac-shift-more-btn__icon" src="' +
              ICON_MAP.chevronRight +

  function renderOverlays() {
    var overlayRoot = document.getElementById("acOverlayRoot");
    if (!overlayRoot) return;

    if (state.photoLightboxIndex >= 0) {
      overlayRoot.style.pointerEvents = "auto";
      overlayRoot.innerHTML = renderPhotoOverlay();
      return;
    }

    if (state.overlays.shifts) {
      overlayRoot.style.pointerEvents = "auto";
      overlayRoot.innerHTML = renderShiftOverlay();
      startPromoTicker();
      return;
    }

    stopPromoTicker();
    overlayRoot.style.pointerEvents = "none";
    overlayRoot.innerHTML = "";
  }

  function hydratePromoState() {
    var promo = loadShiftPromo();
    if (!promo || !promo.shiftId) return;
    if (Number(promo.age) >= 7 && Number(promo.age) <= 14) {
      state.age = clamp(Number(promo.age), 7, 14);
      ageSelectionConfirmed = true;
      persistAge(state.age);
      if (auditRuntime.active) {
        auditRuntime.ageSelected = true;
      }
    }
    var shift = findExactShiftById(promo.shiftId);
    if (!shift) return;
    state.selectedShiftId = shift.id;
    state.direction = shift.direction;
    if (state.step === 0 && ageSelectionConfirmed) {
      state.step = 1;
    }
  }

  function hydrateAgeState() {
    var storedAge = getStoredAgeValue();
    if (!storedAge) return;
    state.age = storedAge;
    ageSelectionConfirmed = true;
    if (state.step === 0) {
      state.step = 1;
    }
    if (auditRuntime.active) {
      auditRuntime.ageSelected = true;
    }
  }

  function openTabTarget(tabElement) {
    var href = tabElement.getAttribute("href");
    if (!href || href.charAt(0) !== "#") return;
    if (state.mode !== "full") return;

    var target = document.querySelector(href);
    if (!target) return;

    target.scrollIntoView({ behavior: "smooth", block: "start" });
  }

  function handleClick(event) {
    var techBadgeClose = event.target.closest('[data-action="tech-badge-close"]');
    if (techBadgeClose) {
      var techBadge = document.getElementById("acTechBadge");
      if (techBadge) {
        techBadge.hidden = true;
      }
      try {
        localStorage.setItem(TECH_BADGE_DISMISSED_KEY, "1");
      } catch (_errTechBadge) {
        // ignore storage errors
      }
      event.preventDefault();
      event.stopPropagation();
      return;
    }

    if (auditRuntime.active && !auditRuntime.allowUiActions) {
      var inAuditControls = event.target.closest(".ac-audit-panel, .ac-audit-control-panel, .ac-audit-stage-panel");
      var auditBadge = event.target.closest(".ac-audit-badge");
      var inTopAuditControl = event.target.closest("#acAuditToggle");
      if (auditBadge || (!inAuditControls && !inTopAuditControl)) {
        event.preventDefault();
        event.stopPropagation();
        return;
      }
    }

    if (auditRuntime.active && auditRuntime.allowUiActions && auditRuntime.lockUntilAge && !auditRuntime.ageSelected) {
      var inAuditPanels = event.target.closest(".ac-audit-panel, .ac-audit-control-panel, .ac-audit-stage-panel");
      if (!inAuditPanels) {
        event.preventDefault();
        event.stopPropagation();
        return;
      }
    }

    if (isAgeGateLocked()) {
      var inAgeInput = event.target.closest("#acAgeInput, .ac-age-input");
      var inAuditPanelsForGate = event.target.closest(".ac-audit-panel, .ac-audit-control-panel, .ac-audit-stage-panel");
      if (!inAgeInput && !inAuditPanelsForGate) {
        event.preventDefault();
        event.stopPropagation();
        nudgeAgeSelection();
        return;
      }
    }

    var toggle = event.target.closest('[data-action="toggle-mode"]');
    if (toggle) {
      setMode(state.mode === "full" ? "compact" : "full");
      return;
    }

    var tab = event.target.closest('[data-action="tab"]');
    if (tab) {
      event.preventDefault();
      setActiveTab(tab.dataset.tab || "info");
      openTabTarget(tab);
      return;
    }

    var contactButton = event.target.closest('[data-action="open-contact"]');
    if (contactButton) {
      clearContactCloseTimer();
      setOverlay("contact", !state.overlays.contact);
      return;
    }

    if (state.overlays.contact && !event.target.closest("#acContactPanel")) {
      setOverlay("contact", false);
      return;
    }

    var prevStep = event.target.closest('[data-action="step-prev"]');
    if (prevStep) {
      setStep(state.step - 1);
      return;
    }

    var nextStep = event.target.closest('[data-action="step-next"]');
    if (nextStep) {
      if (state.step > 0) {
        if (state.overlays.shifts) {
          return;
        }

        track("booking_clicked", {
          step: state.step + 1,
          shift_id: state.selectedShiftId,
          direction: state.direction
        });
        setOverlay("shifts", true);
      } else {
        setStep(state.step + 1);
      }
      return;
    }

    var closeOverlay = event.target.closest('[data-action="overlay-close"]');
    if (closeOverlay) {
      closeAllOverlays();
      return;
    }

    var backdrop = event.target.closest('[data-action="overlay-backdrop"]');
    if (backdrop && event.target === backdrop) {
      closeAllOverlays();
      return;
    }

    var directionButton = event.target.closest('[data-action="set-direction"]');
    if (directionButton) {
      setDirection(directionButton.dataset.direction || "all");
      return;
    }

    var shiftViewButton = event.target.closest('[data-action="set-shift-view"]');
    if (shiftViewButton) {
      setShiftView(shiftViewButton.dataset.shiftView || "list");
      return;
    }

    var shiftButton = event.target.closest('[data-action="select-shift"]');
    if (shiftButton) {
      setSelectedShift(shiftButton.dataset.shiftId || SHIFTS[0].id);
      return;
    }

    var shiftShowMore = event.target.closest('[data-action="shift-show-more"]');
    if (shiftShowMore) {
      shiftsShowAll = !shiftsShowAll;
      renderOverlays();
      return;
    }

    var shiftCalendarToggle = event.target.closest('[data-action="shift-calendar-toggle"]');
    if (shiftCalendarToggle) {
      var calendarShiftId = shiftCalendarToggle.dataset.shiftId || "";
      if (shiftCalendar.open && shiftCalendar.shiftId === calendarShiftId) {
        shiftCalendar.open = false;
        shiftCalendar.shiftId = "";
      } else {
        shiftCalendar.open = true;
        shiftCalendar.shiftId = calendarShiftId;
      }
      renderOverlays();
      return;
    }

    var shiftCalendarClose = event.target.closest('[data-action="shift-calendar-close"]');
    if (shiftCalendarClose) {
      shiftCalendar.open = false;
      shiftCalendar.shiftId = "";
      renderOverlays();
      return;
    }

    var shiftPriceButton = event.target.closest('[data-action="shift-price"]');
    if (shiftPriceButton) {
      shiftCalendar.open = false;
      shiftCalendar.shiftId = "";
      applyShiftPriceStep(shiftPriceButton.dataset.shiftId || SHIFTS[0].id);
      return;
    }

    var photoCategoryButton = event.target.closest('[data-action="photo-cat"]');
    if (photoCategoryButton) {
      setPhotoCategory(photoCategoryButton.dataset.photoCat || "all");
      return;
    }

    if (event.target.closest('[data-action="photo-prev"]')) {
      setPhotoPage(state.photoPage - 1);
      return;
    }

    if (event.target.closest('[data-action="photo-next"]')) {
      setPhotoPage(state.photoPage + 1);
      return;
    }

    var photoOpen = event.target.closest('[data-action="photo-open"]');
    if (photoOpen) {
      setPhotoLightbox(Number(photoOpen.dataset.photoIndex || 0));
      return;
    }

    if (event.target.closest('[data-action="photo-lightbox-prev"]')) {
      setPhotoLightbox(state.photoLightboxIndex - 1);
      return;
    }

    if (event.target.closest('[data-action="photo-lightbox-next"]')) {
      setPhotoLightbox(state.photoLightboxIndex + 1);
      return;
    }

    if (event.target.closest('[data-action="video-prev"]')) {
      setVideoPage(state.videoPage - 1);
      return;
    }

    if (event.target.closest('[data-action="video-next"]')) {
      setVideoPage(state.videoPage + 1);
      return;
    }

    if (event.target.closest('[data-action="reviews-prev"]')) {
      setReviewPage(state.reviewPage - 1);
      return;
    }

    if (event.target.closest('[data-action="reviews-next"]')) {
      setReviewPage(state.reviewPage + 1);
      return;
    }

    if (event.target.closest('[data-action="team-prev"]')) {
      setTeamPage(state.teamPage - 1);
      return;
    }

    if (event.target.closest('[data-action="team-next"]')) {
      setTeamPage(state.teamPage + 1);
      return;
    }

    var faqOverlayItem = event.target.closest(".ac-left-faq__item");
    if (faqOverlayItem) {
      var faqScope = faqOverlayItem.closest(".ac-left-faq");
      if (faqScope) {
        var items = faqScope.querySelectorAll(".ac-left-faq__item");
        for (var i = 0; i < items.length; i += 1) {
          if (items[i] !== faqOverlayItem) {
            items[i].classList.remove("is-open");
          }
        }
      }
      faqOverlayItem.classList.toggle("is-open");
      return;
    }

    var faqCategory = event.target.closest('[data-action="faq-cat"]');
    if (faqCategory) {
      setFaqCategory(faqCategory.dataset.faqCat || "medicine");
    }
  }

  function handleInput(event) {
    if (auditRuntime.active && !auditRuntime.allowUiActions) {
      var inAuditControls = event.target.closest(".ac-audit-panel, .ac-audit-control-panel, .ac-audit-stage-panel");
      if (!inAuditControls) {

  function setupAuditToggleButton() {
    var existing = document.getElementById("acAuditToggle");
    if (existing) return;

    var button = document.createElement("button");
    button.id = "acAuditToggle";
    button.className = "ac-audit-toggle-btn";
    button.type = "button";
    button.setAttribute("aria-label", "Переключить audit режим");

    var isAudit = false;
    try {
      isAudit = (window.location.search || "").indexOf("audit=1") !== -1;
    } catch (_err) {
      isAudit = false;
    }

    button.textContent = isAudit ? "Audit OFF" : "Audit ON";

    button.addEventListener("click", function () {
      var url;
      try {
        url = new URL(window.location.href);
      } catch (_err) {
        return;
      }

      if (url.searchParams.get("audit") === "1") {
        url.searchParams.delete("audit");
      } else {
        url.searchParams.set("audit", "1");
      }

      window.location.href = url.toString();
    });

    document.body.appendChild(button);
  }

    function toPercent(value, total) {
      if (!total) return "0.00%";
      return (Math.round((value / total) * 10000) / 100).toFixed(2) + "%";
    }

    function readAnchor(item) {
      var rect = item.node.getBoundingClientRect();
      var centerX = rect.left + rect.width / 2;
      var centerY = rect.top + rect.height / 2;
      var anchorX = centerX <= window.innerWidth / 2 ? "left" : "right";
      var anchorY = centerY <= window.innerHeight / 2 ? "top" : "bottom";
      var offsetX = anchorX === "left" ? rect.left : window.innerWidth - rect.right;
      var offsetY = anchorY === "top" ? rect.top : window.innerHeight - rect.bottom;
      return {
        anchorX: anchorX,
        anchorY: anchorY,
        offsetX: Math.round(offsetX),
        offsetY: Math.round(offsetY),
        normX: toPercent(offsetX, window.innerWidth),
        normY: toPercent(offsetY, window.innerHeight)
      };
    }

    function getNodeSelector(node) {
      if (!node) return "unknown";
      if (node.id) return "#" + node.id;
      if (node.classList && node.classList.length) return "." + node.classList[0];
      return String(node.tagName || "node").toLowerCase();
    }

    function readParentAnchor(item) {
      var nodeRect = item.node.getBoundingClientRect();
      var parent = item.node.parentElement;
      if (!parent) {
        return {
          parentSelector: "document",
          anchorX: "left",
          anchorY: "top",
          left: Math.round(nodeRect.left),
          top: Math.round(nodeRect.top),
          right: Math.round(window.innerWidth - nodeRect.right),
          bottom: Math.round(window.innerHeight - nodeRect.bottom),
          offsetX: Math.round(nodeRect.left),
          offsetY: Math.round(nodeRect.top),
          normX: toPercent(nodeRect.left, window.innerWidth),
          normY: toPercent(nodeRect.top, window.innerHeight)
        };
      }
      var parentRect = parent.getBoundingClientRect();
      var relLeft = nodeRect.left - parentRect.left;
      var relTop = nodeRect.top - parentRect.top;
      var relRight = parentRect.right - nodeRect.right;
      var relBottom = parentRect.bottom - nodeRect.bottom;
      return {
        parentSelector: getNodeSelector(parent),
        anchorX: "left",
        anchorY: "top",
        left: Math.round(relLeft),
        top: Math.round(relTop),
        right: Math.round(relRight),
        bottom: Math.round(relBottom),
        offsetX: Math.round(relLeft),
        offsetY: Math.round(relTop),
        normX: toPercent(relLeft, parentRect.width || 1),
        normY: toPercent(relTop, parentRect.height || 1)
      };
    }

    function normalizeToGrid(value) {
